<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>PDF Page Remover</title>

	<link rel="stylesheet" href="css/pulsecraft.css" />

	<style>
		body {
			margin: 20px auto;
			max-width: 900px;
			min-height: 100vh;
			padding-bottom: 80px;
		}

		header {
			text-align: center;
			margin-bottom: 20px;
		}

		h1 {
			margin: 0;
			font-size: 1.65em;
			font-weight: 800;
			line-height: 1.1;
			color: var(--fg);
		}

		.subtitle {
			margin: 8px auto 0;
			color: var(--muted);
			font-size: 0.92em;
			line-height: 1.35;
			max-width: 680px;
		}

		.panel {
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 14px;
			box-shadow: 0 6px 16px var(--shadow);
			padding: 18px;
		}

		.mode-row {
			display: flex;
			justify-content: center;
			gap: 12px;
			flex-wrap: wrap;
			margin-bottom: 18px;
		}

		.mode-button {
			border: 1px solid var(--border);
			background: var(--panel-alt);
			color: var(--fg);
			border-radius: 999px;
			padding: 10px 18px;
			font-size: 1em;
			font-weight: 800;
			cursor: pointer;
			opacity: 0.76;
			min-width: 110px;
		}

		.mode-button:hover {
			opacity: 1;
		}

		.mode-button.active {
			background: #607895;
			border-color: rgba(255, 255, 255, 0.35);
			color: #ffffff;
			opacity: 1;
			box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.16);
		}

		.drop-zone {
			border: 2px dashed var(--border);
			border-radius: 16px;
			background: rgba(255, 255, 255, 0.04);
			padding: 42px 22px;
			text-align: center;
			cursor: pointer;
			transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
		}

		.drop-zone.dragover {
			border-color: #8fb3d9;
			background: rgba(143, 179, 217, 0.14);
			transform: translateY(-1px);
		}

		.drop-main {
			margin: 0;
			color: var(--fg);
			font-size: 1.15em;
			font-weight: 800;
			line-height: 1.35;
		}

		.drop-sub {
			margin: 10px 0 0;
			color: var(--muted);
			font-size: 0.92em;
			line-height: 1.4;
		}

		.file-input {
			display: none;
		}

		.status {
			margin-top: 14px;
			min-height: 1.4em;
			color: var(--muted);
			font-size: 0.92em;
			line-height: 1.4;
			text-align: center;
		}

		.status.ok {
			color: #8ddf9c;
		}

		.status.error {
			color: #ff9f9f;
		}

		.home-row {
			margin-top: 24px;
		}

		@media (max-width: 600px) {
			body {
				max-width: 94%;
			}

			.mode-button {
				flex: 1 1 100%;
			}

			.drop-zone {
				padding: 34px 16px;
			}
		}
	</style>
</head>

<body>
	<header>
		<h1>PDF Page Remover</h1>
		<p class="subtitle">Choose a removal mode, then drop a PDF. The processed PDF downloads using the original filename.</p>
	</header>

	<main>
		<section class="panel">
			<div class="mode-row" aria-label="Page removal mode">
				<button class="mode-button active" type="button" data-mode="even">- Even</button>
				<button class="mode-button" type="button" data-mode="odd">- Odd</button>
				<button class="mode-button" type="button" data-mode="secondThird">- 2nd &amp; 3rd</button>
			</div>

			<div id="dropZone" class="drop-zone" role="button" tabindex="0">
				<p id="dropMain" class="drop-main">Drop PDF here to delete even pages.</p>
				<p id="dropSub" class="drop-sub">Keeps pages 1, 3, 5, 7...</p>
			</div>

			<input id="fileInput" class="file-input" type="file" accept="application/pdf,.pdf" />

			<div id="status" class="status">Ready.</div>
		</section>

		<div class="home-row">
			<a class="home-button" href="index.html" title="Back to PulseCraft Utilities">Home</a>
		</div>
	</main>

	<footer class="footer" data-footer-type="common" data-version="1.0.0.2026"></footer>

	<script src="js/pdf-lib.min.js"></script>
	<script src="js/pulsecraft-footer.js"></script>

	<script>
		const modeButtons = document.querySelectorAll(".mode-button");
		const dropZone = document.getElementById("dropZone");
		const dropMain = document.getElementById("dropMain");
		const dropSub = document.getElementById("dropSub");
		const fileInput = document.getElementById("fileInput");
		const status = document.getElementById("status");

		let selectedMode = "even";

		const modeText = {
			even: {
				main: "Drop PDF here to delete even pages.",
				sub: "Keeps pages 1, 3, 5, 7..."
			},
			odd: {
				main: "Drop PDF here to delete odd pages.",
				sub: "Keeps pages 2, 4, 6, 8..."
			},
			secondThird: {
				main: "Drop PDF here to delete the 2nd & 3rd pages of each 3-page set.",
				sub: "Keeps pages 1, 4, 7, 10..."
			}
		};

		function setStatus(message, type = "") {
			status.textContent = message;
			status.className = "status";
			if (type) {
				status.classList.add(type);
			}
		}

		function setMode(mode) {
			selectedMode = mode;

			modeButtons.forEach(button => {
				button.classList.toggle("active", button.dataset.mode === mode);
			});

			dropMain.textContent = modeText[mode].main;
			dropSub.textContent = modeText[mode].sub;
			setStatus("Ready.");
		}

		function shouldKeepPage(pageIndex, mode) {
			const humanPage = pageIndex + 1;

			if (mode === "even") {
				return humanPage % 2 !== 0;
			}

			if (mode === "odd") {
				return humanPage % 2 === 0;
			}

			if (mode === "secondThird") {
				return pageIndex % 3 === 0;
			}

			return true;
		}

		async function processPdf(file) {
			if (!file || !file.name.toLowerCase().endsWith(".pdf")) {
				setStatus("Please drop a PDF file.", "error");
				return;
			}

			try {
				setStatus(`Processing ${file.name}...`);

				const arrayBuffer = await file.arrayBuffer();
				const sourcePdf = await PDFLib.PDFDocument.load(arrayBuffer);
				const outputPdf = await PDFLib.PDFDocument.create();

				const pageCount = sourcePdf.getPageCount();
				const keepIndexes = [];

				for (let i = 0; i < pageCount; i++) {
					if (shouldKeepPage(i, selectedMode)) {
						keepIndexes.push(i);
					}
				}

				if (keepIndexes.length === 0) {
					setStatus("No pages would remain after this operation. Nothing downloaded.", "error");
					return;
				}

				const copiedPages = await outputPdf.copyPages(sourcePdf, keepIndexes);
				copiedPages.forEach(page => outputPdf.addPage(page));

				const outputBytes = await outputPdf.save();
				const blob = new Blob([outputBytes], { type: "application/pdf" });
				const url = URL.createObjectURL(blob);

				const link = document.createElement("a");
				link.href = url;
				link.download = file.name;
				document.body.appendChild(link);
				link.click();
				link.remove();

				URL.revokeObjectURL(url);

				const removedCount = pageCount - keepIndexes.length;
				setStatus(`Done. Kept ${keepIndexes.length} page(s), removed ${removedCount} page(s). Download requested as ${file.name}.`, "ok");
			} catch (error) {
				console.error(error);
				setStatus("Could not process this PDF. It may be encrypted, damaged, or unsupported.", "error");
			}
		}

		modeButtons.forEach(button => {
			button.addEventListener("click", () => setMode(button.dataset.mode));
		});

		dropZone.addEventListener("click", () => fileInput.click());

		dropZone.addEventListener("keydown", event => {
			if (event.key === "Enter" || event.key === " ") {
				event.preventDefault();
				fileInput.click();
			}
		});

		fileInput.addEventListener("change", () => {
			const file = fileInput.files[0];
			processPdf(file);
			fileInput.value = "";
		});

		["dragenter", "dragover"].forEach(eventName => {
			dropZone.addEventListener(eventName, event => {
				event.preventDefault();
				dropZone.classList.add("dragover");
			});
		});

		["dragleave", "drop"].forEach(eventName => {
			dropZone.addEventListener(eventName, event => {
				event.preventDefault();
				dropZone.classList.remove("dragover");
			});
		});

		dropZone.addEventListener("drop", event => {
			const file = event.dataTransfer.files[0];
			processPdf(file);
		});

		setMode("even");
	</script>
</body>
</html>
