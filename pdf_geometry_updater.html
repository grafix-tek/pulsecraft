<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>PDF Geometry Updater</title>
	<link rel="stylesheet" href="css/pulsecraft.css">
	<style>
		:root {
			--accent: #607895;
		}

		body {
			margin: 20px auto;
			max-width: 90%;
			min-height: 100vh;
			padding-bottom: 46px;
		}

		main {
			width: 100%;
			max-width: 980px;
			margin: 0 auto;
			padding: 0 0 40px;
		}

		.small {
			color: var(--muted);
			font-size: 13px;
			line-height: 1.45;
		}

		code {
			background: rgba(255, 255, 255, 0.08);
			color: var(--fg);
			padding: 2px 6px;
			border-radius: 6px;
		}

		.box {
			margin-top: 16px;
			background: var(--panel);
			border: 2px dashed var(--border);
			border-radius: 12px;
			padding: 18px;
			text-align: center;
			box-shadow: 0 6px 16px var(--shadow);
		}

		.box.drag {
			border-color: var(--accent);
			background: #263650;
		}

		.row {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
			margin-top: 14px;
			align-items: center;
			justify-content: center;
		}

		.inset-grid {
			display: grid;
			grid-template-columns: repeat(4, minmax(120px, 1fr));
			gap: 10px;
			width: 100%;
			max-width: 640px;
			margin: 16px auto 0;
			text-align: left;
		}

		.field label {
			display: block;
			margin-bottom: 5px;
			color: var(--muted);
			font-size: 12px;
			font-weight: 700;
		}

		.field input {
			width: 100%;
			height: 34px;
			border-radius: 8px;
			border: 1px solid var(--border);
			background: var(--panel-alt);
			color: var(--fg);
			padding: 0 10px;
			font-size: 14px;
		}

		.field input:focus {
			outline: 2px solid rgba(96, 120, 149, 0.7);
			outline-offset: 1px;
		}

		.link-row {
			margin-top: 12px;
		}

		.link-insets-button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 38px;
			height: 34px;
			border-radius: 8px;
			border: 1px solid var(--border);
			background: var(--panel-alt);
			color: var(--muted);
			cursor: pointer;
			box-shadow: 0 3px 8px rgba(0, 0, 0, 0.18);
		}

		.link-insets-button:hover {
			color: var(--fg);
			border-color: var(--accent);
		}

		.link-insets-button[aria-pressed="true"] {
			background: var(--accent);
			color: var(--fg);
			border-color: var(--accent);
			box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.35);
		}

		.link-insets-button svg {
			width: 20px;
			height: 20px;
			stroke: currentColor;
			stroke-width: 2;
			stroke-linecap: round;
			stroke-linejoin: round;
			fill: none;
		}

		.link-insets-button .icon-unlinked {
			display: none;
		}

		.link-insets-button[aria-pressed="false"] .icon-linked {
			display: none;
		}

		.link-insets-button[aria-pressed="false"] .icon-unlinked {
			display: block;
		}

		label {
			user-select: none;
		}

		input[type="checkbox"] {
			accent-color: var(--accent);
		}

		@media (max-width: 700px) {
			body {
				max-width: 92%;
			}

			h1 {
				font-size: 1.45em;
			}

			.inset-grid {
				grid-template-columns: repeat(2, minmax(120px, 1fr));
			}
		}

		@media (max-width: 380px) {
			.inset-grid {
				grid-template-columns: 1fr;
			}
		}
	</style>

	<script src="js/pdf-lib.min.js"></script>
</head>

<body>
	<main>
		<header class="pc-tool-header">
			<a class="home-button pc-tool-home" href="index.html" title="Back to PulseCraft Utilities">Home</a>

			<div class="pc-tool-heading">
				<h1 class="pc-tool-title">PDF Geometry Updater — TrimBox Setter</h1>
				<p class="pc-tool-subtitle">
					This tool does <b>not</b> visually crop. It leaves <code>MediaBox</code> alone and only sets <code>TrimBox</code>.
				</p>
			</div>
		</header>
		<div id="drop" class="box">
			<div><b>Drag &amp; drop PDFs here</b></div>

			<div class="inset-grid" aria-label="Trim removal in inches">
				<div class="field">
					<label for="topInset">Top inches</label>
					<input id="topInset" type="number" value="4" step="0.0001" inputmode="decimal" />
				</div>
				<div class="field">
					<label for="bottomInset">Bottom inches</label>
					<input id="bottomInset" type="number" value="4" step="0.0001" inputmode="decimal" />
				</div>
				<div class="field">
					<label for="leftInset">Left inches</label>
					<input id="leftInset" type="number" value="4" step="0.0001" inputmode="decimal" />
				</div>
				<div class="field">
					<label for="rightInset">Right inches</label>
					<input id="rightInset" type="number" value="4" step="0.0001" inputmode="decimal" />
				</div>
			</div>

			<div class="row link-row">
				<button id="linkInsets" class="link-insets-button" type="button" aria-pressed="true" aria-label="Inset values linked. Click to edit independently." title="Inset values linked. Click to edit independently.">
					<svg class="icon-linked" viewBox="0 0 24 24" aria-hidden="true">
						<path d="M10 13a5 5 0 0 0 7.07 0l2.12-2.12a5 5 0 0 0-7.07-7.07L11 4.93" />
						<path d="M14 11a5 5 0 0 0-7.07 0L4.81 13.12a5 5 0 0 0 7.07 7.07L13 19.07" />
					</svg>
					<svg class="icon-unlinked" viewBox="0 0 24 24" aria-hidden="true">
						<path d="M10 13a5 5 0 0 0 7.07 0l2.12-2.12a5 5 0 0 0-7.07-7.07L11 4.93" />
						<path d="M14 11a5 5 0 0 0-7.07 0L4.81 13.12a5 5 0 0 0 7.07 7.07L13 19.07" />
						<path d="M4 20L20 4" />
					</svg>
				</button>
			</div>

			<div class="row">
				<label>
					<input id="clearCrop" type="checkbox" />
					Optional: clear CropBox if present (prevents pre-existing “visual crop”)
				</label>
			</div>

			<div class="small" style="margin-top:10px;">
				Auto-process and auto-download!
			</div>
		</div>

		<div id="log" class="pc-log" aria-live="polite"></div>

	</main>

	<footer class="footer" data-footer-type="common" data-version="4.0.1.2026"></footer>

	<script src="js/pulsecraft-footer.js"></script>
	<script src="js/pulsecraft-nav.js"></script>

	<script>
		(() => {
			const drop = document.getElementById('drop');
			const logEl = document.getElementById('log');
			const clearCrop = document.getElementById('clearCrop');
			const linkInsets = document.getElementById('linkInsets');
			const topInset = document.getElementById('topInset');
			const bottomInset = document.getElementById('bottomInset');
			const leftInset = document.getElementById('leftInset');
			const rightInset = document.getElementById('rightInset');
			const insetInputs = [topInset, bottomInset, leftInset, rightInset];

			const PTS_PER_INCH = 72;

			let isRunning = false;
			let isSyncingInsets = false;
			let lastEditedInset = topInset;

			function log(msg) {
				logEl.textContent += msg + "\n";
				logEl.scrollTop = logEl.scrollHeight;
			}

			function readInches(input) {
				const value = parseFloat(input.value);
				return Number.isFinite(value) ? value : 0;
			}

			function roundTo4(value) {
				return Number(parseFloat(value).toFixed(4));
			}

			function fmt(value) {
				return roundTo4(value).toString();
			}

			function insetsAreLinked() {
				return linkInsets.getAttribute('aria-pressed') === 'true';
			}

			function setInsetLinkState(isLinked) {
				linkInsets.setAttribute('aria-pressed', isLinked ? 'true' : 'false');
				linkInsets.setAttribute(
					'aria-label',
					isLinked ? 'Inset values linked. Click to edit independently.' : 'Inset values independent. Click to link all values.'
				);
				linkInsets.title = isLinked ? 'Inset values linked. Click to edit independently.' : 'Inset values independent. Click to link all values.';
			}

			function syncInsetValues(sourceInput) {
				if (!insetsAreLinked() || isSyncingInsets) return;

				isSyncingInsets = true;
				insetInputs.forEach((input) => {
					if (input !== sourceInput) input.value = sourceInput.value;
				});
				isSyncingInsets = false;
			}

			insetInputs.forEach((input) => {
				input.addEventListener('input', () => {
					lastEditedInset = input;
					syncInsetValues(input);
				});
			});

			linkInsets.addEventListener('click', () => {
				const nextLinkedState = !insetsAreLinked();
				setInsetLinkState(nextLinkedState);

				if (nextLinkedState) {
					syncInsetValues(lastEditedInset || topInset);
				}
			});

			function getInsetValues() {
				const inches = {
					top: readInches(topInset),
					bottom: readInches(bottomInset),
					left: readInches(leftInset),
					right: readInches(rightInset)
				};

				return {
					inches,
					points: {
						top: roundTo4(inches.top * PTS_PER_INCH),
						bottom: roundTo4(inches.bottom * PTS_PER_INCH),
						left: roundTo4(inches.left * PTS_PER_INCH),
						right: roundTo4(inches.right * PTS_PER_INCH)
					}
				};
			}

			function makeBoxArray(ctx, [llx, lly, urx, ury]) {
				const { PDFArray, PDFNumber } = PDFLib;
				const arr = PDFArray.withContext(ctx);
				arr.push(PDFNumber.of(llx));
				arr.push(PDFNumber.of(lly));
				arr.push(PDFNumber.of(urx));
				arr.push(PDFNumber.of(ury));
				return arr;
			}

			function getBox(page, boxName) {
				const { PDFName } = PDFLib;
				const key = PDFName.of(boxName);
				const node = page.node;
				const box = node.get(key);
				if (!box) return null;

				const nums = [];
				for (let i = 0; i < 4; i++) nums.push(box.get(i).asNumber());
				return nums; // [llx,lly,urx,ury]
			}

			async function processOne(file, insetValues) {
				const { PDFDocument, PDFName } = PDFLib;

				const bytes = new Uint8Array(await file.arrayBuffer());
				const pdfDoc = await PDFDocument.load(bytes, { ignoreEncryption: false });
				const ctx = pdfDoc.context;

				const pages = pdfDoc.getPages();
				let changedPages = 0;
				let firstTrimBox = null;

				for (let i = 0; i < pages.length; i++) {
					const page = pages[i];

					// Use MediaBox; fallback to CropBox if MediaBox absent (rare).
					const media = getBox(page, 'MediaBox') || getBox(page, 'CropBox');
					if (!media) throw new Error(`Page ${i+1}: cannot find MediaBox/CropBox.`);

					const [llx, lly, urx, ury] = media;
					const newBox = [
						roundTo4(llx + insetValues.points.left),
						roundTo4(lly + insetValues.points.bottom),
						roundTo4(urx - insetValues.points.right),
						roundTo4(ury - insetValues.points.top)
					];

					const newW = roundTo4(newBox[2] - newBox[0]);
					const newH = roundTo4(newBox[3] - newBox[1]);
					if (newW <= 0 || newH <= 0) {
						throw new Error(`Page ${i+1}: inset too large for page size (TrimBox invalid).`);
					}

					// Set TrimBox only
					page.node.set(PDFName.of('TrimBox'), makeBoxArray(ctx, newBox));
					changedPages++;
					if (!firstTrimBox) firstTrimBox = newBox;

					// Optional: remove CropBox (only if you check the box)
					if (clearCrop.checked) page.node.delete(PDFName.of('CropBox'));
				}

				const outBytes = await pdfDoc.save();
				const outBlob = new Blob([outBytes], { type: 'application/pdf' });

				const a = document.createElement('a');
				a.href = URL.createObjectURL(outBlob);

				// IMPORTANT: keep original filename (no suffix)
				a.download = file.name;

				a.click();
				URL.revokeObjectURL(a.href);

				log(`✅ ${file.name}: set TrimBox on ${changedPages} page(s).`);
				if (firstTrimBox) log(`   Page 1 TrimBox: [${firstTrimBox.map(fmt).join(', ')}] pts`);
			}

			async function run(files) {
				if (isRunning) {
					log("⚠️ Busy processing — try again in a moment.");
					return;
				}
				isRunning = true;

				const insetValues = getInsetValues();

				logEl.textContent = "";
				log(`Insets in inches: top ${fmt(insetValues.inches.top)}, bottom ${fmt(insetValues.inches.bottom)}, left ${fmt(insetValues.inches.left)}, right ${fmt(insetValues.inches.right)}.`);
				log(`Insets in points: top ${fmt(insetValues.points.top)}, bottom ${fmt(insetValues.points.bottom)}, left ${fmt(insetValues.points.left)}, right ${fmt(insetValues.points.right)}.`);
				log(`Mode: Set TrimBox only. MediaBox unchanged.${clearCrop.checked ? " CropBox cleared." : ""}`);
				log("----");

				for (const f of files) {
					try {
						await processOne(f, insetValues);
					} catch (e) {
						log(`❌ ${f.name}: ${e.message || e}`);
					}
				}

				log("Done. Drop more PDFs anytime.");
				isRunning = false;
			}

			// Drag/drop handling (auto-run)
			drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('drag'); });
			drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
			drop.addEventListener('drop', (e) => {
				e.preventDefault();
				drop.classList.remove('drag');

				const files = [...e.dataTransfer.files]
					.filter(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));

				if (!window.PDFLib) {
					logEl.textContent = "pdf-lib did not load. Make sure js/pdf-lib.min.js exists in the PulseCraft repo.";
					return;
				}

				if (files.length === 0) {
					logEl.textContent = "No PDFs detected. Drop a .pdf file.";
					return;
				}

				run(files); // <-- auto process + auto download
			});

			window.addEventListener('load', () => {
				setInsetLinkState(true);

				if (!window.PDFLib) {
					logEl.textContent = "pdf-lib did not load. Make sure js/pdf-lib.min.js exists in the PulseCraft repo.";
				} else {
					logEl.textContent = "Ready";
				}
			});
		})();
	</script>
</body>
</html>
